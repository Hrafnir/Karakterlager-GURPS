<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 210 297"
  preserveAspectRatio="none"
>
  <defs>
    <style>
      .cyan {
        fill: none;
        stroke: #22d3ee;
        stroke-width: 1.1;
        stroke-linecap: square;
        stroke-linejoin: miter;
      }

      .cyan-thin {
        fill: none;
        stroke: #67e8f9;
        stroke-width: 0.45;
        stroke-linecap: square;
        stroke-linejoin: miter;
        opacity: 0.85;
      }

      .magenta {
        fill: none;
        stroke: #f472b6;
        stroke-width: 0.8;
        stroke-linecap: square;
        stroke-linejoin: miter;
      }

      .violet {
        fill: none;
        stroke: #a78bfa;
        stroke-width: 0.5;
        opacity: 0.8;
      }

      .panel {
        fill: #08111f;
        opacity: 0.22;
        stroke: #22d3ee;
        stroke-width: 0.35;
      }

      .signal {
        fill: #22d3ee;
        opacity: 0.75;
      }

      .hot {
        fill: #f472b6;
        opacity: 0.8;
      }

      .ghost {
        fill: none;
        stroke: #22d3ee;
        stroke-width: 0.25;
        opacity: 0.35;
      }
    </style>

    <pattern
      id="micro-grid"
      width="8"
      height="8"
      patternUnits="userSpaceOnUse"
    >
      <path class="ghost" d="M8 0 H0 V8" />
    </pattern>

    <g id="corner-hud">
      <path class="cyan" d="M0 0 H38 L44 6" />
      <path class="cyan" d="M0 0 V38 L6 44" />

      <path class="magenta" d="M8 8 H31 L36 13" />
      <path class="magenta" d="M8 8 V31 L13 36" />

      <path class="cyan-thin" d="M13 18 H33" />
      <path class="cyan-thin" d="M18 13 V33" />

      <rect x="9" y="9" width="6" height="6" class="panel" />
      <rect x="18" y="9" width="12" height="3" class="panel" />
      <rect x="9" y="18" width="3" height="12" class="panel" />

      <circle cx="34" cy="16" r="1.6" class="hot" />
      <circle cx="16" cy="34" r="1.6" class="signal" />

      <path class="violet" d="M25 22 H42 M22 25 V42" />
    </g>

    <g id="data-strip-horizontal">
      <rect x="0" y="0" width="5" height="1.4" class="signal" />
      <rect x="8" y="0" width="12" height="1.4" class="hot" />
      <rect x="23" y="0" width="4" height="1.4" class="signal" />
      <rect x="31" y="0" width="18" height="1.4" class="signal" />
      <rect x="53" y="0" width="7" height="1.4" class="hot" />
      <rect x="65" y="0" width="14" height="1.4" class="signal" />
      <rect x="83" y="0" width="3" height="1.4" class="hot" />
      <rect x="91" y="0" width="10" height="1.4" class="signal" />
    </g>

    <g id="data-strip-vertical">
      <rect x="0" y="0" width="1.4" height="5" class="signal" />
      <rect x="0" y="8" width="1.4" height="12" class="hot" />
      <rect x="0" y="23" width="1.4" height="4" class="signal" />
      <rect x="0" y="31" width="1.4" height="18" class="signal" />
      <rect x="0" y="53" width="1.4" height="7" class="hot" />
      <rect x="0" y="65" width="1.4" height="14" class="signal" />
      <rect x="0" y="83" width="1.4" height="3" class="hot" />
      <rect x="0" y="91" width="1.4" height="10" class="signal" />
    </g>
  </defs>

  <!-- transparent HUD grid inside full page -->
  <rect x="0" y="0" width="210" height="297" fill="url(#micro-grid)" opacity="0.35" />

  <!-- main angular frame -->
  <path
    class="cyan"
    d="M5 18
       L18 5
       H74
       L81 12
       H129
       L136 5
       H192
       L205 18
       V92
       L198 99
       V198
       L205 205
       V279
       L192 292
       H136
       L129 285
       H81
       L74 292
       H18
       L5 279
       V205
       L12 198
       V99
       L5 92
       Z"
  />

  <path
    class="magenta"
    d="M10 23
       L23 10
       H67
       L74 17
       H136
       L143 10
       H187
       L200 23
       V84
       L193 91
       V206
       L200 213
       V274
       L187 287
       H143
       L136 280
       H74
       L67 287
       H23
       L10 274
       V213
       L17 206
       V91
       L10 84
       Z"
  />

  <path
    class="cyan-thin"
    d="M16 29
       L29 16
       H181
       L194 29
       V268
       L181 281
       H29
       L16 268
       Z"
  />

  <!-- corners -->
  <use href="#corner-hud" x="6" y="6" />
  <use href="#corner-hud" x="204" y="6" transform="scale(-1 1)" />
  <use href="#corner-hud" x="6" y="291" transform="scale(1 -1)" />
  <use href="#corner-hud" x="204" y="291" transform="scale(-1 -1)" />

  <!-- top data strips -->
  <g opacity="0.9">
    <use href="#data-strip-horizontal" x="55" y="8" />
    <use href="#data-strip-horizontal" x="55" y="288" />
  </g>

  <!-- side data strips -->
  <g opacity="0.85">
    <use href="#data-strip-vertical" x="8" y="98" />
    <use href="#data-strip-vertical" x="201" y="98" />
  </g>

  <!-- HUD panels -->
  <rect x="88" y="7.5" width="34" height="8" class="panel" />
  <path class="cyan-thin" d="M93 11.5 H117" />
  <circle cx="96" cy="11.5" r="1" class="hot" />
  <circle cx="114" cy="11.5" r="1" class="signal" />

  <rect x="88" y="281.5" width="34" height="8" class="panel" />
  <path class="cyan-thin" d="M93 285.5 H117" />
  <circle cx="96" cy="285.5" r="1" class="signal" />
  <circle cx="114" cy="285.5" r="1" class="hot" />

  <!-- side labels as abstract code marks -->
  <g opacity="0.75">
    <path class="cyan-thin" d="M14 119 H22 M14 124 H28 M14 129 H24" />
    <path class="magenta" d="M14 136 H30" />

    <path class="cyan-thin" d="M196 119 H188 M196 124 H182 M196 129 H186" />
    <path class="magenta" d="M196 136 H180" />

    <path class="cyan-thin" d="M14 166 H25 M14 171 H29 M14 176 H20" />
    <path class="magenta" d="M14 183 H32" />

    <path class="cyan-thin" d="M196 166 H185 M196 171 H181 M196 176 H190" />
    <path class="magenta" d="M196 183 H178" />
  </g>

  <!-- subtle diagonal tech accents -->
  <g opacity="0.55">
    <path class="violet" d="M34 17 L45 28 H68" />
    <path class="violet" d="M176 17 L165 28 H142" />
    <path class="violet" d="M34 280 L45 269 H68" />
    <path class="violet" d="M176 280 L165 269 H142" />
  </g>

  <!-- tiny scan blocks -->
  <g opacity="0.8">
    <rect x="42" y="11" width="4" height="2" class="hot" />
    <rect x="48" y="11" width="8" height="2" class="signal" />
    <rect x="154" y="11" width="8" height="2" class="signal" />
    <rect x="164" y="11" width="4" height="2" class="hot" />

    <rect x="42" y="284" width="4" height="2" class="hot" />
    <rect x="48" y="284" width="8" height="2" class="signal" />
    <rect x="154" y="284" width="8" height="2" class="signal" />
    <rect x="164" y="284" width="4" height="2" class="hot" />
  </g>
</svg>
