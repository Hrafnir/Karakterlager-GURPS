<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 210 297"
  preserveAspectRatio="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #3a2416;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .inner {
        fill: none;
        stroke: #7c2d12;
        stroke-width: 0.85;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .sea {
        fill: none;
        stroke: #0f3d4c;
        stroke-width: 0.75;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rope {
        fill: none;
        stroke: #6b4a2d;
        stroke-width: 0.85;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .faded {
        fill: #7c2d12;
        opacity: 0.11;
      }

      .sea-fill {
        fill: #0f3d4c;
        opacity: 0.12;
      }

      .mark {
        fill: none;
        stroke: #3a2416;
        stroke-width: 0.45;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.62;
      }

      .dot {
        fill: #3a2416;
        opacity: 0.65;
      }
    </style>

    <g id="rope-corner">
      <path
        class="faded"
        d="M0 0 H35 C29 9 30 18 37 27 C24 24 15 27 7 37 C9 22 6 10 0 0 Z"
      />

      <path class="outer" d="M5 5 H39 M5 5 V39" />

      <path
        class="rope"
        d="M10 8
           C14 12 18 12 22 8
           C26 12 30 12 34 8"
      />
      <path
        class="rope"
        d="M8 10
           C12 14 12 18 8 22
           C12 26 12 30 8 34"
      />

      <path
        class="rope"
        d="M14 14
           C18 18 22 18 26 14
           C30 18 34 18 38 14"
      />
      <path
        class="rope"
        d="M14 14
           C18 18 18 22 14 26
           C18 30 18 34 14 38"
      />

      <!-- Compass point in corner -->
      <path class="sea" d="M27 27 L31 18 L35 27 L31 36 Z" />
      <path class="sea" d="M22 31 L31 27 L40 31 L31 35 Z" />
      <circle cx="31" cy="31" r="1.4" class="dot" />

      <!-- Hook-like detail -->
      <path
        class="outer"
        d="M38 8
           C43 10 45 15 42 19
           C39 23 34 22 33 18"
      />
    </g>

    <g id="wave-horizontal">
      <path
        class="sea"
        d="M0 0
           C6 -5 12 5 18 0
           C24 -5 30 5 36 0
           C42 -5 48 5 54 0
           C60 -5 66 5 72 0
           C78 -5 84 5 90 0"
      />
      <path
        class="mark"
        d="M6 6
           C12 2 18 10 24 6
           M38 6
           C44 2 50 10 56 6
           M70 6
           C76 2 82 10 88 6"
      />
    </g>

    <g id="wave-vertical">
      <path
        class="sea"
        d="M0 0
           C-5 6 5 12 0 18
           C-5 24 5 30 0 36
           C-5 42 5 48 0 54
           C-5 60 5 66 0 72
           C-5 78 5 84 0 90"
      />
      <path
        class="mark"
        d="M6 6
           C2 12 10 18 6 24
           M6 38
           C2 44 10 50 6 56
           M6 70
           C2 76 10 82 6 88"
      />
    </g>

    <g id="compass-rose">
      <circle cx="0" cy="0" r="10" class="sea" />
      <circle cx="0" cy="0" r="5" class="inner" />
      <path class="outer" d="M0 -14 L3 -3 L14 0 L3 3 L0 14 L-3 3 L-14 0 L-3 -3 Z" />
      <path class="sea" d="M0 -9 L2 -2 L9 0 L2 2 L0 9 L-2 2 L-9 0 L-2 -2 Z" />
      <circle cx="0" cy="0" r="1.4" class="dot" />
    </g>

    <g id="map-marks">
      <path class="mark" d="M0 0 C5 3 9 1 12 -3" />
      <path class="mark" d="M18 5 C23 1 27 3 31 8" />
      <path class="mark" d="M8 16 C13 12 18 13 22 18" />
      <path class="mark" d="M27 19 C31 16 35 17 38 21" />
      <circle cx="5" cy="9" r="0.8" class="dot" />
      <circle cx="24" cy="12" r="0.8" class="dot" />
      <path class="mark" d="M34 2 l3 3 m0 -3 l-3 3" />
    </g>
  </defs>

  <!-- faint old-chart tint -->
  <rect x="4" y="4" width="202" height="289" rx="3" class="faded" />

  <!-- main chart frame -->
  <rect x="5" y="5" width="200" height="287" rx="3" class="outer" />
  <rect x="10" y="10" width="190" height="277" rx="2.2" class="inner" />
  <rect x="15" y="15" width="180" height="267" rx="1.6" class="sea" opacity="0.7" />

  <!-- corners -->
  <use href="#rope-corner" x="7" y="7" />
  <use href="#rope-corner" x="203" y="7" transform="scale(-1 1)" />
  <use href="#rope-corner" x="7" y="290" transform="scale(1 -1)" />
  <use href="#rope-corner" x="203" y="290" transform="scale(-1 -1)" />

  <!-- rope-like top and bottom borders -->
  <g opacity="0.9">
    <use href="#wave-horizontal" x="59" y="12" />
    <use href="#wave-horizontal" x="59" y="285" transform="scale(1 -1)" />
  </g>

  <!-- side borders -->
  <g opacity="0.84">
    <use href="#wave-vertical" x="12" y="78" />
    <use href="#wave-vertical" x="198" y="78" transform="scale(-1 1)" />
    <use href="#wave-vertical" x="12" y="168" />
    <use href="#wave-vertical" x="198" y="168" transform="scale(-1 1)" />
  </g>

  <!-- compass medallions -->
  <g opacity="0.78">
    <use href="#compass-rose" x="105" y="17" />
    <use href="#compass-rose" x="105" y="280" />
  </g>

  <!-- subtle map marks -->
  <g opacity="0.55">
    <use href="#map-marks" x="31" y="40" />
    <use href="#map-marks" x="141" y="43" />
    <use href="#map-marks" x="30" y="229" />
    <use href="#map-marks" x="141" y="226" />
  </g>

  <!-- dashed route marks -->
  <path
    class="mark"
    d="M31 66
       C50 50 67 73 86 58
       C103 45 121 66 139 54
       C158 41 174 61 187 48"
    stroke-dasharray="2.2 2.4"
  />

  <path
    class="mark"
    d="M28 249
       C47 232 64 256 83 241
       C102 226 122 248 139 233
       C158 219 174 238 186 225"
    stroke-dasharray="2.2 2.4"
  />

  <!-- small anchor-like details -->
  <g opacity="0.68">
    <path
      class="sea"
      d="M21 134
         V149
         M16 141 H26
         M18 149
         C18 154 24 154 24 149
         M21 134
         C18 132 18 128 21 126
         C24 128 24 132 21 134"
    />

    <path
      class="sea"
      d="M189 134
         V149
         M184 141 H194
         M186 149
         C186 154 192 154 192 149
         M189 134
         C186 132 186 128 189 126
         C192 128 192 132 189 134"
    />
  </g>

  <!-- decorative knots at midpoints -->
  <g opacity="0.75">
    <circle cx="105" cy="8.8" r="2" class="sea-fill" />
    <circle cx="105" cy="288.2" r="2" class="sea-fill" />
    <circle cx="8.8" cy="148.5" r="2" class="sea-fill" />
    <circle cx="201.2" cy="148.5" r="2" class="sea-fill" />

    <circle cx="105" cy="8.8" r="0.9" class="dot" />
    <circle cx="105" cy="288.2" r="0.9" class="dot" />
    <circle cx="8.8" cy="148.5" r="0.9" class="dot" />
    <circle cx="201.2" cy="148.5" r="0.9" class="dot" />
  </g>
</svg>
