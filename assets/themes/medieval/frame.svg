<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 210 297"
  preserveAspectRatio="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #4b2614;
        stroke-width: 1.8;
        stroke-linejoin: round;
      }

      .inner {
        fill: none;
        stroke: #7f1d1d;
        stroke-width: 0.95;
        stroke-linejoin: round;
      }

      .gold {
        fill: none;
        stroke: #b45309;
        stroke-width: 0.75;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .red-fill {
        fill: #7f1d1d;
        opacity: 0.13;
      }

      .gold-fill {
        fill: #b45309;
        opacity: 0.14;
      }

      .vine {
        fill: none;
        stroke: #4b2614;
        stroke-width: 0.65;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.9;
      }

      .leaf {
        fill: #7f1d1d;
        opacity: 0.18;
        stroke: #7f1d1d;
        stroke-width: 0.25;
      }
    </style>

    <g id="corner-illumination">
      <path
        class="red-fill"
        d="M0 0 H36 C30 8 29 17 35 27 C23 23 15 27 8 37 C9 22 6 11 0 0 Z"
      />

      <path class="outer" d="M5 5 H38 M5 5 V38" />
      <path class="inner" d="M10 10 H33 M10 10 V33" />

      <path
        class="gold"
        d="M15 30
           C18 22 21 16 29 13
           M18 30
           C24 25 30 24 35 28
           M14 22
           C19 19 21 14 19 9"
      />

      <path
        class="vine"
        d="M14 31
           C16 24 21 19 28 15
           C31 13 33 10 34 7"
      />

      <path class="leaf" d="M20 21 C17 18 17 15 20 13 C24 16 24 19 20 21 Z" />
      <path class="leaf" d="M27 17 C25 13 26 10 30 9 C33 13 31 16 27 17 Z" />
      <path class="leaf" d="M28 25 C30 21 34 20 37 23 C34 27 31 28 28 25 Z" />

      <circle cx="12" cy="12" r="2.2" class="gold-fill" />
      <circle cx="12" cy="12" r="1.1" fill="#7f1d1d" opacity="0.55" />

      <path
        class="gold"
        d="M7 37
           C13 35 18 37 22 42
           M37 7
           C35 13 37 18 42 22"
      />
    </g>

    <g id="small-cross">
      <path class="gold" d="M0 4 H8 M4 0 V8" />
      <circle cx="4" cy="4" r="1.1" fill="#7f1d1d" opacity="0.5" />
    </g>

    <g id="vine-horizontal">
      <path
        class="vine"
        d="M0 0
           C8 -5 15 5 23 0
           C31 -5 38 5 46 0
           C54 -5 61 5 69 0
           C77 -5 84 5 92 0"
      />
      <path class="leaf" d="M11 -3 C8 -7 9 -10 13 -11 C16 -7 15 -4 11 -3 Z" />
      <path class="leaf" d="M35 3 C38 7 37 10 33 11 C30 7 31 4 35 3 Z" />
      <path class="leaf" d="M59 -3 C56 -7 57 -10 61 -11 C64 -7 63 -4 59 -3 Z" />
      <path class="leaf" d="M83 3 C86 7 85 10 81 11 C78 7 79 4 83 3 Z" />
    </g>

    <g id="vine-vertical">
      <path
        class="vine"
        d="M0 0
           C-5 8 5 15 0 23
           C-5 31 5 38 0 46
           C-5 54 5 61 0 69
           C-5 77 5 84 0 92"
      />
      <path class="leaf" d="M-3 11 C-7 8 -10 9 -11 13 C-7 16 -4 15 -3 11 Z" />
      <path class="leaf" d="M3 35 C7 38 10 37 11 33 C7 30 4 31 3 35 Z" />
      <path class="leaf" d="M-3 59 C-7 56 -10 57 -11 61 C-7 64 -4 63 -3 59 Z" />
      <path class="leaf" d="M3 83 C7 86 10 85 11 81 C7 78 4 79 3 83 Z" />
    </g>
  </defs>

  <!-- Soft manuscript tint -->
  <rect x="4" y="4" width="202" height="289" rx="3" class="gold-fill" />

  <!-- Primary manuscript frame -->
  <rect x="5" y="5" width="200" height="287" rx="2.5" class="outer" />
  <rect x="9" y="9" width="192" height="279" rx="2" class="inner" />
  <rect x="14" y="14" width="182" height="269" rx="1.5" class="gold" />

  <!-- Corner illuminations -->
  <use href="#corner-illumination" x="7" y="7" />
  <use href="#corner-illumination" x="203" y="7" transform="scale(-1 1)" />
  <use href="#corner-illumination" x="7" y="290" transform="scale(1 -1)" />
  <use href="#corner-illumination" x="203" y="290" transform="scale(-1 -1)" />

  <!-- Top / bottom vines -->
  <g opacity="0.9">
    <use href="#vine-horizontal" x="58" y="13" />
    <use href="#vine-horizontal" x="58" y="284" transform="scale(1 -1)" />
  </g>

  <!-- Side vines -->
  <g opacity="0.82">
    <use href="#vine-vertical" x="13" y="75" />
    <use href="#vine-vertical" x="197" y="75" transform="scale(-1 1)" />
  </g>

  <!-- Heraldic top cartouche -->
  <path
    class="outer"
    d="M81 12
       H129
       C124 19 116 23 105 23
       C94 23 86 19 81 12 Z"
  />
  <path
    class="red-fill"
    d="M88 14
       H122
       C118 18 112 20 105 20
       C98 20 92 18 88 14 Z"
  />
  <path
    class="gold"
    d="M105 13 V21 M98 16 H112"
  />

  <!-- Bottom cartouche -->
  <path
    class="outer"
    d="M81 285
       H129
       C124 278 116 274 105 274
       C94 274 86 278 81 285 Z"
  />
  <path
    class="red-fill"
    d="M88 283
       H122
       C118 279 112 277 105 277
       C98 277 92 279 88 283 Z"
  />

  <!-- Small crosses / jewels -->
  <g opacity="0.8">
    <use href="#small-cross" x="52" y="10" />
    <use href="#small-cross" x="150" y="10" />
    <use href="#small-cross" x="52" y="279" />
    <use href="#small-cross" x="150" y="279" />

    <use href="#small-cross" x="10" y="55" />
    <use href="#small-cross" x="10" y="235" />
    <use href="#small-cross" x="192" y="55" />
    <use href="#small-cross" x="192" y="235" />
  </g>

  <!-- Subtle side panels -->
  <path class="gold" d="M18 48 V249" opacity="0.45" />
  <path class="gold" d="M192 48 V249" opacity="0.45" />
  <path class="gold" d="M48 18 H162" opacity="0.45" />
  <path class="gold" d="M48 279 H162" opacity="0.45" />
</svg>
